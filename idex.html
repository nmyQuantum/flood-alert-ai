<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cảnh báo Ngập lụt AI</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
  textarea { width: 100%; height: 100px; padding: 10px; font-size: 16px; }
  button { padding: 10px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
  #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
</style>
</head>
<body>
  <h2>🌊 Báo cáo tình huống ngập lụt</h2>
  <textarea id="report" placeholder="Ví dụ: nước ngập tới đầu gối ở đường Trần Phú, nhà có người già"></textarea>
  <br>
  <button onclick="analyze()">Gửi báo cáo</button>
  <div id="result"></div>

<script>
async function analyze() {
  const text = document.getElementById('report').value;
  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = 'Đang phân tích...';

  const response = await fetch('BACKEND_URL/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
  const data = await response.json();

  resultDiv.style.backgroundColor = data.risk === 'Cao' ? '#ffcccc' : data.risk === 'Trung bình' ? '#fff3cd' : '#d4edda';
  resultDiv.innerHTML = `<b>Mức độ rủi ro:</b> ${data.risk}<br><b>Khuyến nghị:</b> ${data.advice}`;
}
</script>
</body>
</html>
